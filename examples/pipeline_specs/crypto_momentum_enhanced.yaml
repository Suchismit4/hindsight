spec_version: "1.0"
name: "crypto_momentum_enhanced"
version: "2.0"

# Global time range for data loading
time_range:
  start: "2023-01-01"
  end: "2023-12-31"

# Data sources - SAME as baseline (will reuse L2 cache)
data:
  crypto_prices:
    provider: "crypto"
    dataset: "spot/binance"
    frequency: "H"
    filters: {}
    processors: []

# Feature engineering - EXTENDED with additional indicators
features:
  operations:
    - name: "momentum_indicators"
      formulas:
        # Simple moving averages (SAME as baseline)
        sma:
          - {window: 20}
          - {window: 50}
        
        # Exponential moving averages (SAME as baseline)
        ema:
          - {window: 12}
          - {window: 26}
        
        # Relative strength index (SAME as baseline)
        rsi:
          - {window: 14}
    
    # NEW: Additional volatility indicators
    - name: "volatility_indicators"
      formulas:
        sma:
          - {window: 100}  # Long-term trend
        
        ema:
          - {window: 50}   # Medium-term trend

# Preprocessing - SAME as baseline (will reuse L4 cache for shared features)
preprocessing:
  mode: "independent"
  
  shared:
    - type: "per_asset_ffill"
      name: "forward_fill"
      vars: ["close", "volume"]
  
  learn:
    - type: "cs_zscore"
      name: "normalizer"
      # Extended to include new features
      vars: ["close", "volume", "sma_ww20", "sma_ww50", "sma_ww100", "ema_ww12", "ema_ww26", "ema_ww50"]
      out_suffix: "_norm"

# Model training - DIFFERENT model type (RandomForest instead of Linear) with walk-forward validation
model:
  adapter: "sklearn"
  type: "RandomForestRegressor"  # sklearn.ensemble.RandomForestRegressor
  params:
    n_estimators: 50
    max_depth: 14
    min_samples_leaf: 10
    bootstrap: true
    max_samples: 0.5
    n_jobs: -1
    random_state: 0
  features:
    - "close_norm"
    - "volume_norm"
    - "sma_ww20_norm"
    - "sma_ww50_norm"
    - "sma_ww100_norm"
    - "ema_ww12_norm"
    - "ema_ww26_norm"
    - "ema_ww50_norm"
  target: "close"
  walk_forward:
    train_span_hours: 120  # 5 days training window
    infer_span_hours: 24   # 1 day inference window
    step_hours: 24         # 1 day step forward
    gap_hours: 0           # No gap between train/infer
    start: "2020-01-22 18:00:00"
    end: "2023-12-01 00:00:00"
  adapter_params:
    output_var: "close_pred"
    use_proba: false
  runner_params:
    overlap_policy: "last"  # Use last prediction for overlapping periods

# Metadata for documentation
metadata:
  description: "Enhanced crypto momentum strategy with additional features and RandomForest"
  author: "Hindsight Team"
  tags: ["crypto", "momentum", "random_forest", "enhanced"]

