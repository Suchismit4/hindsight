spec_version: "1.0"
name: "ff3_model"
version: "2.0"

time_range:
  start: "2010-01-01"
  end: "2021-12-31"

data:
  crsp:
    provider: "wrds"
    dataset: "equity/crsp"
    frequency: "M"
    columns: ["date", "permno", "permco", "prc", "shrout", "ret"]
    filters:
      shrcd__in: [10, 11]
      exchcd__in: [1, 2, 3]
    external_tables:
      - path: "/wrds/crsp/sasdata/a_stock/msedelist.sas7bdat"
        type: "replace"
        on: "permno"
        time_column: "dlstdt"
        from_column: "dlret"
        to_column: "ret"
      - path: "/wrds/crsp/sasdata/a_stock/msenames.sas7bdat"
        type: "lookup"
        on: "permno"
        columns: ["exchcd", "shrcd"]
    processors:
      transforms:
        - type: "set_coordinates"
          coord_type: "permco"
        - type: "fix_market_equity"

  compustat:
    provider: "wrds"
    dataset: "equity/compustat"
    frequency: "Y"
    columns:
      - "gvkey"
      - "datadate"
      - "seq"
      - "txditc"
      - "pstkrv"
      - "pstkl"
      - "pstk"
      - "indfmt"
      - "datafmt"
      - "popsrc"
      - "consol"
    filters:
      indfmt: "INDL"
      datafmt: "STD"
      popsrc: "D"
      consol: "C"
    processors:
      transforms:
        - type: "preferred_stock"

merge_base: "crsp"
merges:
  - right_name: "compustat"
    on: "asset"
    time_alignment: "as_of"
    time_offset_months: 6
    variables: ["seq", "txditc", "ps"]

features:
  operations:
    - name: "ff3_base_features"
      formulas:
        is_nyse:
          expression: "eq($exchcd, 1)"
        be:
          expression: "$seq + $txditc - $ps"
        be_lag:
          expression: "shift($be, 6)"
        me_dec:
          expression: "shift($me, 6)"
        beme:
          expression: "$be_lag / $me_dec"
        me_lag1:
          expression: "shift($me, 1)"

    - name: "ff3_june_signals"
      depends_on: ["ff3_base_features"]
      formulas:
        me_june:
          expression: "where(eq(month_coord($me), 6), $me, nan_const())"
        beme_june:
          expression: "where(eq(month_coord($beme), 6), $beme, nan_const())"

preprocessing:
  mode: "independent"
  infer:
    - type: "sort"
      signal: "me_june"
      n_bins: 2
      scope: "is_nyse"
      name: "size_sort"
    - type: "sort"
      signal: "beme_june"
      n_bins: 3
      quantiles: [0.3, 0.7]
      scope: "is_nyse"
      name: "bm_sort"
    - type: "per_asset_ffill"
      name: "ffill_portfolios"
      vars: ["me_june_port", "beme_june_port"]
    - type: "port_ret"
      groupby: ["me_june_port", "beme_june_port"]
      returns_var: "ret"
      weights_var: "me_lag1"
      name: "ff_port_ret"
    - type: "factor_spread"
      source: "port_ret_me_june_port_beme_june_port"
      factors:
        SMB:
          long: {me_june_port_dim: 0}
          short: {me_june_port_dim: 1}
          average_over: "beme_june_port_dim"
        HML:
          long: {beme_june_port_dim: 2}
          short: {beme_june_port_dim: 0}
          average_over: "me_june_port_dim"
      name: "ff_factors"

metadata:
  description: "Standard June-rebalanced Fama-French 3-factor construction on WRDS CRSP + Compustat"
  tags: ["ff3", "wrds", "crsp", "compustat", "factors"]

