commands:
  install: ~/conda/envs/jax/bin/pip install -r requirements.txt
  test: ~/conda/envs/jax/bin/pytest tests/ -v
  test_dev: ~/conda/envs/jax/bin/pytest dev/ -v
  lint: ~/conda/envs/jax/bin/flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
  lint_warnings: ~/conda/envs/jax/bin/flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
  import_check: ~/conda/envs/jax/bin/python -c "import src"
  typecheck: echo "No typecheck configured for this project"

services: {}
