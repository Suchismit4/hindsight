data:
  # Vanilla standard equity data configuration
  name: "equity-standard"
  start_date: "2000-01-01"
  end_date: "2024-01-01"
  cache_path: "~/data/cache/"
  
  sources:
    # Primary equity price data
    equity_prices:
      provider: "wrds"
      dataset: "crsp"
      frequency: "monthly"
       
      schema:
        time_var: "date"
        identifier_var: "permno"
        
      # Filters for common shares on major exchanges
      filters:
        shrcd__in: [10, 11]        # Common shares only
        exchcd__in: [1, 2, 3]      # NYSE, AMEX, NASDAQ
      
      # External tables to merge at DataFrame level (before xarray conversion)
      external_tables:
        # Delisting returns - replace ret with dlret when available
        - path: "/wrds/crsp/sasdata/a_stock/msedelist.sas7bdat"
          type: "replace"
          on: "permno"
          time_column: "dlstdt"
          from_column: "dlret"
          to_column: "ret"
          
        # Company names and metadata - static lookup
        - path: "/wrds/crsp/sasdata/a_stock/msenames.sas7bdat"
          type: "lookup"
          on: "permno"
          columns: ["comnam", "exchcd", "shrcd"]
        
      # Post-processing transforms (after xarray conversion)
      processors:
        transforms:
          - type: "set_coordinates"
            coord_type: "permco"
          - type: "fix_market_equity"
